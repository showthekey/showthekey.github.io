  <body>
    <header class="site-header">
      <div class="site-width header-row">
        <a class="wordmark" href="index.html" aria-label="Hiroki Shozaki, top">

        <nav aria-label="Main navigation">

    <main class="site-width listing-page">
      <header class="page-title">
        <p class="eyebrow">ACTIVITY LOG</p>
        <h1>News</h1>
        <p>研究活動・発表・フィールド調査の記録です。</p>
      </header>
      
      <!-- Duplicate a news-card block below when adding news. Replace the placeholder image path with your photograph. -->
      <div class="editorial-grid">
        <article class="news-card feature">
          <!-- リンク先を空(#)にしています。詳細ページを作った場合はそこにURLを入れます -->
          <a href="#">
            <img src="images/news/2024-komatsu.svg" alt="研究室訪問の写真用プレースホルダー">
            <div>
              <time datetime="2024-08-08">2024.08.08–09</time>
              <h2>ダヌンツィオ大学を訪問しました</h2>
              <p>小松吾郎博士の研究室を訪問しました。</p>
            </div>
          </a>
        </article>
        
        <article class="news-card">
          <a href="#">
            <img src="images/news/2024-mars.svg" alt="学会発表の写真用プレースホルダー">
            <div>
              <time datetime="2024-07-22">2024.07.22–25</time>
              <h2>第10回国際火星会議でポスター発表</h2>
              <p>Caltech で開催された国際火星会議に参加しました。</p>
            </div>
          </a>
        </article>
        
        <article class="news-card">
          <a href="#">
            <img src="images/news/2024-field.svg" alt="フィールド調査の写真用プレースホルダー">
            <div>
              <time datetime="2024-06-04">2024.06.04–07.02</time>
              <h2>アメリカ中西部で現地調査</h2>
              <p>火星河川地形アナログの現地調査を行いました。</p>
            </div>
          </a>
        </article>
      </div>
      
    </main>

    <footer class="site-footer">
